<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="format-detection" content="telephone=no, email=no, address=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="荆楚理工学院 移动校园">
    <link rel="apple-touch-icon" href="icon.png">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <link rel="dns-prefetch" href="https://becoming-trout-101437.upstash.io">
    <link rel="preconnect" href="https://becoming-trout-101437.upstash.io">

    <link rel="preload" as="image" href="home-bg.png">
    <link rel="preload" as="image" href="card-bg.png">

    <title>荆楚理工学院 移动校园</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="admin-trigger" id="gestureArea" aria-label="三指触摸打开控制台"></div>
    
    <div class="wx-container" role="main">
        <header class="wx-nav">
            <span id="nav-back-btn" onclick="showHome()" style="cursor:pointer; visibility: hidden;" aria-label="返回首页">〈 首页</span>
            <span id="nav-title">首页</span>
            <div class="wx-capsule" aria-hidden="true"><span>•••</span> <span>●</span></div>
        </header>
        
        <section id="page-home">
            <img class="home-mock-bg" src="home-bg.png" alt="荆楚理工学院小程序首页背景" loading="eager">
            <div class="hotspot-alumni-card" onclick="tryNavigateToCard()" aria-label="点击进入校友卡"></div>
        </section>
        
        <section id="page-card" style="display: none;">
            <div class="alumni-card">
                <div class="card-top-area">
                    <div class="card-serial" id="v-cardId">--------</div>
                    <div class="info-fields">
                        <div class="info-row"><div class="info-label">姓名：</div><div class="info-value skeleton" id="v-name">--</div></div>
                        <div class="info-row"><div class="info-label">学号：</div><div class="info-value skeleton" id="v-stuId">--</div></div>
                        <div class="info-row"><div class="info-label">院系：</div><div class="info-value skeleton" id="v-department">--</div></div>
                        <div class="info-row"><div class="info-label">专业：</div><div class="info-value skeleton" id="v-major">--</div></div>
                        <div class="info-row"><div class="info-label">毕业年份：</div><div class="info-value skeleton" id="v-gradYear">--</div></div>
                    </div>
                </div>
                <div class="card-gold-strip"></div>
            </div>

            <div class="white-panel">
                <div class="qr-header-title">校友二维码</div>
                <div class="qr-box-border">
                    <img id="v-qr" src="qr.png" alt="校友卡二维码" loading="lazy">
                </div>
                <div class="refresh-lnk" onclick="triggerManualRefresh()" aria-label="刷新时间">↻ 刷新</div>
                <div class="live-timer-container" id="live-clock-bar">当前时间：读取中...</div>
            </div>
        </section>
    </div>

    <!-- 注册按钮（固定在右下角） -->
    <div class="register-btn" onclick="showRegisterModal()">📝 注册校友卡</div>

    <!-- 注册模态框 -->
    <div id="register-modal" class="register-modal" style="display:none;">
        <div class="register-modal-content">
            <div class="register-modal-header">校友注册</div>
            <div class="register-modal-body">
                <div class="form-group"><label>姓名 *</label><input type="text" id="reg-name" placeholder="请填写真实姓名"></div>
                <div class="form-group"><label>学号 *</label><input type="text" id="reg-stuId" placeholder="学号"></div>
                <div class="form-group"><label>院系</label><input type="text" id="reg-department" placeholder="如：经济与管理学院"></div>
                <div class="form-group"><label>专业</label><input type="text" id="reg-major" placeholder="如：财务管理"></div>
                <div class="form-group"><label>毕业年份</label><input type="number" id="reg-gradYear" placeholder="2020"></div>
                <div class="form-group"><label>验证码</label><div><span id="captcha-question">5 + 3 = ?</span> <input type="text" id="reg-captcha" style="width:80px; margin-left:10px;"></div></div>
            </div>
            <div class="register-modal-footer">
                <button onclick="closeRegisterModal()">取消</button>
                <button onclick="submitRegister()" style="background:#28a745; color:white;">立即注册</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
