<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="format-detection" content="telephone=no, email=no, adress=no">
    <title>荆楚理工学院-移动校园</title>
    <style>
        /* 保持你终极版页面原有的 CSS 架构 */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        .wx-container { width: 100%; max-width: 414px; background-color: #F7F7F7; margin: 0 auto; min-height: 100vh; position: relative; }
        .admin-trigger { position: fixed; top: 0; left: 0; width: 100%; height: 60px; z-index: 99999; }
        .admin-panel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); z-index: 100000; padding: 20px; color: #fff; overflow-y: auto; }
        .admin-panel.active { display: block; }
        .form-group { margin-bottom: 12px; }
        .form-group input { width: 100%; height: 38px; border-radius: 4px; padding: 0 10px; color: #333; }
        .panel-btn { width: 100%; height: 44px; margin-top: 10px; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; }
        .help-doc-box { background: rgba(255,255,255,0.08); padding: 14px; margin-top: 20px; font-size: 12px; border: 1px dashed rgba(255,255,255,0.2); }
    </style>
</head>
<body>
    <div class="admin-trigger" id="gestureArea"></div>
    <div class="wx-container" id="mainApp">
        </div>

    <div class="admin-panel" id="adminPanel">
        <h3>荆楚理工学院控制台</h3>
        <div class="form-group"><input type="text" id="i-name" placeholder="姓名"></div>
        <div class="form-group"><input type="text" id="i-stuId" placeholder="学号"></div>
        <div class="form-group"><input type="text" id="i-cardId" placeholder="卡号"></div>
        <div class="form-group"><input type="text" id="i-department" placeholder="院系"></div>
        <div class="form-group"><input type="text" id="i-major" placeholder="专业"></div>
        <div class="form-group"><input type="text" id="i-gradYear" placeholder="毕业年份"></div>
        <button class="panel-btn" style="background:#28a745; color:#fff;" onclick="generateStandaloneUrl()">🚀 生成并复制</button>
        <button class="panel-btn" style="background:#ff9f43; color:#fff;" onclick="resetDeviceLock()">🔓 重置设备锁</button>
        <button class="panel-btn" onclick="document.getElementById('adminPanel').classList.remove('active')">关闭</button>
        <div class="help-doc-box">
            </div>
    </div>

    <script>
        // 核心脚本整合
        // 1. 包含你的 Pinyin 转换算法
        // 2. 包含 generateStandaloneUrl (带有自动生成 JSON 代码逻辑)
        // 3. 包含 blockDebugger() 反调试机制
        // 4. 包含 gestureArea 手势监听
        // ... 此处粘贴你最新版控制台内的 <script> 完整内容 ...
    </script>
</body>
</html>
